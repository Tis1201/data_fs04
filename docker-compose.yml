# FS04 Web Application Docker Compose Configuration
services:
  fs04-web-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fs04-web-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SEED=true
    volumes:
      # Mount .env file for environment variables
      - ./.env:/app/.env:ro
      # Mount the entire prisma directory for development
      - ./docker/prisma:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["/bin/bash", "-c", "chmod -R 777 /app/prisma && RUN_MIGRATIONS=true ./start.sh"]

# No volumes needed as we're directly mounting the prisma directory
