# FS04 Web Application Docker Compose Configuration
services:
  fs04-web-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fs04-web-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SEED=false
    volumes:
      # Mount .env file for environment variables
      - ./.env:/app/.env:ro
      # Use a named volume for the database
      # - db_data:/app/prisma
      # # Mount schema and migrations as read-only
      # - ./prisma/schema.prisma:/app/prisma/schema.prisma:ro
      # - ./prisma/migrations:/app/prisma/migrations:ro
      # - ./prisma/seed.ts:/app/prisma/seed.ts:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["/bin/bash", "-c", "chmod -R 777 /app/prisma && RUN_MIGRATIONS=true RUN_SEED=true ./start.sh"]

volumes:
  # Named volume for database persistence
  db_data:
