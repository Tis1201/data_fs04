# FS04 Web Application Docker Compose Configuration
version: '3.8'
services:
  fs04-web-app:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fs04-web-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Set SEED=true on first run if you want to auto-seed admin user
      # - SEED=true
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - fs04-web-app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


