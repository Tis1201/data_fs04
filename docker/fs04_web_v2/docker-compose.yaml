services:
  app:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: docker/fs04_web_v2/Dockerfile
      args:
        PUBLIC_VANNA_API_URL: ${PUBLIC_VANNA_API_URL}
    image: fs04_web_v2:${TAG:-latest}
    container_name: fs04_web_v2
    ports:
      - "${PORT:-3001}:3000"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

