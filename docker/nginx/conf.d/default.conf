server {
    listen 80;
    server_name localhost;

    # Access log with rotation
    access_log /var/log/nginx/access.log main;
    # Error log with rotation
    error_log /var/log/nginx/error.log warn;

    # CORS headers for all responses
    add_header Access-Control-Allow-Origin '*';
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
    add_header Access-Control-Expose-Headers 'Content-Length,Content-Range';

    # Google Fonts proxy for CSS
    location ~* ^/fonts/(.*) {
        resolver 8.8.8.8;
        proxy_pass https://fonts.googleapis.com/$1$is_args$args;
        proxy_set_header Host fonts.googleapis.com;
        proxy_ssl_server_name on;
        proxy_set_header Referer "";
        add_header Access-Control-Allow-Origin *;
        expires 30d;
        access_log off;
    }
    
    # Google Font files proxy
    location ~* ^/font-files/(.*) {
        resolver 8.8.8.8;
        proxy_pass https://fonts.gstatic.com/$1$is_args$args;
        proxy_set_header Host fonts.gstatic.com;
        proxy_ssl_server_name on;
        proxy_set_header Referer "";
        add_header Access-Control-Allow-Origin *;
        expires 30d;
        access_log off;
    }

    # Webhook API with strict rate limiting (both per-IP and global)
    location ~* ^/api/webhook/ {
        # Apply webhook-specific per-IP rate limiting
        limit_req zone=webhook_limit burst=3 nodelay;
        # Apply webhook-specific global rate limiting
        limit_req zone=webhook_global burst=10 nodelay;
        limit_req_status 429;
        
        proxy_pass http://fs04-web-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        
        # Log webhook requests with additional details
        access_log /var/log/nginx/webhook.log main;
    }

    # WebSocket support
    location / {
        # Apply rate limiting to main application
        limit_req zone=app_limit burst=10 nodelay;
        limit_req_status 429;
        
        proxy_pass http://fs04-web-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific headers
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;

        # Buffer settings for WebSocket
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://fs04-web-app:3000;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Static files
    location /static/ {
        alias /app/static/;
        expires 1d;

        # Apply rate limiting
        limit_req zone=static_limit burst=5 nodelay;
        limit_req_status 429;
    }
}
