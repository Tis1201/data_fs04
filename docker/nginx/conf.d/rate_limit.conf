# Rate limiting zones

# Per-IP rate limits
# Static files: 10 requests per minute per IP
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=10r/m;

# Main application: 6 requests per minute per IP (1 req per 10 seconds)
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=6r/m;

# Global rate limits (across all IPs)
# Global limit for the entire application: 300 requests per minute
limit_req_zone "global" zone=global_limit:10m rate=300r/m;
